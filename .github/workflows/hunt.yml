name: Z E U S B O T Omni-Hunter

on:
  schedule:
    - cron: '0 * * * *' # Scans every hour
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Stealth Engine
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Omni-Hunt
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunt_keybox.py

      - name: Git Sync
        run: |
          git config --global user.name "Z E U S B O T"
          git config --global user.email "zeusbot@atomicmail.io"
          
          # Force create directory if script didn't find new keys
          mkdir -p keyboxes
          git add keyboxes/
          
          if ! git diff --cached --quiet; then
            git commit -m "bot: omni-archived keybox [skip ci]"
            git push
          else
            echo "Working tree clean. No new keys found."
          fi
