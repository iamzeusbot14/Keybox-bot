name: Z E U S B O T Keybox Hunter

on:
  schedule:
    - cron: '0 * * * *' # Hourly check
  workflow_dispatch: # Manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Hunter Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunt_keybox.py

      - name: Sync Hash State
        run: |
          git config --global user.name "Z E U S B O T"
          git config --global user.email "zeusbot@atomicmail.io"
          git add last_keybox_hash.txt
          # Commit the new hash and push back to repo
          git commit -m "bot: sync new keybox hash [skip ci]" || exit 0
          git push
