name: Z E U S B O T Stealth Hunter

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Playwright & Deps
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Stealth Hunt
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunt_keybox.py

      - name: Git Push Archive
        run: |
          git config --global user.name "Z E U S B O T"
          git config --global user.email "zeusbot@atomicmail.io"
          
          # Only run if folder exists
          if [ -d "keyboxes" ]; then
            git add keyboxes/
            # If there are changes, commit them
            if ! git diff --cached --quiet; then
              git commit -m "bot: stealth-archived keybox [skip ci]"
              git push
            else
              echo "Nothing new to archive."
            fi
          fi
