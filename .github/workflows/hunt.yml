name: Z E U S B O T Archive Hunter

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly every hour
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for Z E U S B O T to push to your repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Hunter Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunt_keybox.py

      - name: Sync Archive to Git
        run: |
          # Use your specific bot identity
          git config --global user.name "Z E U S B O T"
          git config --global user.email "zeusbot@atomicmail.io"
          
          # Ensure the directory exists to avoid errors
          mkdir -p keyboxes
          git add keyboxes/
          
          # Only commit and push if a new file was actually added
          if git diff --staged --quiet; then
            echo "No new unique keyboxes to save."
          else
            git commit -m "bot: archived new unique keybox [skip ci]"
            git push
          fi
