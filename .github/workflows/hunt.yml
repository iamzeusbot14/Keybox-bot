name: Z E U S B O T Omni-Hunter

on:
  schedule:
    - cron: '15 * * * *' # Runs at 15 minutes past every hour
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Execute Omni-Hunt
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunt_keybox.py
      - name: Git Push Archive
        run: |
          git config --global user.name "Z E U S B O T"
          git config --global user.email "zeusbot@atomicmail.io"
          git add keyboxes/
          # Only commit if there are actual changes
          git commit -m "bot: archived new keybox from omni-hunt [skip ci]" || exit 0
          git push
