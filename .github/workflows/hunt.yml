name: Z E U S B O T Archive Hunter

on:
  schedule:
    - cron: '0 * * * *' # Every hour on the hour
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the bot to push to your repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Hunter Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunt_keybox.py

      - name: Sync Archive to Git
        run: |
          # Z E U S B O T Identity Configuration
          git config --global user.name "Z E U S B O T"
          git config --global user.email "zeusbot@atomicmail.io"
          
          # Create directory if it doesn't exist
          mkdir -p keyboxes
          git add keyboxes/
          
          # Only push if a new file was actually archived
          if git diff --staged --quiet; then
            echo "No new unique keyboxes found this hour."
          else
            git commit -m "bot: archived new unique keybox [skip ci]"
            git push
          fi
